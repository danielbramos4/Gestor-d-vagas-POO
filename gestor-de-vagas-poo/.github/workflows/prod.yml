name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gestor-de-vagas-poo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Permissão Maven Wrapper
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw clean package -DskipTestsean package -DskipTests